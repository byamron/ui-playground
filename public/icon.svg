<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="58%" stop-color="#000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <mask id="ringMask">
      <rect width="180" height="180" fill="white"/>
      <circle cx="90" cy="90" r="40" fill="black"/>
    </mask>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <g mask="url(#ringMask)">
    <foreignObject x="20" y="20" width="140" height="140">
      <div xmlns="http://www.w3.org/1999/xhtml" style="width:140px;height:140px;border-radius:70px;background:conic-gradient(from 90deg in oklch longer hue, oklch(0.72 0.18 0deg), oklch(0.72 0.18 360deg));"></div>
    </foreignObject>
    <g>
      <circle cx="90" cy="20" r="14" fill="#f5a3a3"/>
      <circle cx="150" cy="50" r="14" fill="#f0c878"/>
      <circle cx="160" cy="110" r="14" fill="#a8d99b"/>
      <circle cx="120" cy="155" r="14" fill="#8dc8e8"/>
      <circle cx="55" cy="155" r="14" fill="#a3b0f0"/>
      <circle cx="20" cy="110" r="14" fill="#d09be0"/>
      <circle cx="30" cy="50" r="14" fill="#f0a6c8"/>
    </g>
  </g>
</svg>
